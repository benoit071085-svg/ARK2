<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perform40 — Choix de landing page</title>
<style>
  :root{
    --ink:#0a0f0a;
    --cream:#f7f5f0;
    --green:#1f4d3a;
    --muted:#6b7570;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--cream);
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:2rem;
  }
  .wrap{
    max-width:560px;
    width:100%;
    text-align:center;
  }
  h1{
    font-size:clamp(1.5rem,4vw,2rem);
    margin-bottom:.5rem;
    letter-spacing:-.01em;
  }
  p{
    color:var(--muted);
    margin-bottom:2.5rem;
    font-size:1rem;
  }
  .choices{
    display:flex;
    gap:1rem;
    flex-wrap:wrap;
    justify-content:center;
  }
  a.btn{
    flex:1 1 220px;
    display:block;
    padding:1.1rem 1.5rem;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
    font-size:1.05rem;
    transition:transform .15s ease, opacity .15s ease;
    border:2px solid var(--green);
  }
  a.btn:hover{transform:translateY(-2px)}
  .btn-a{
    background:var(--green);
    color:var(--cream);
  }
  .btn-a:hover{opacity:.9}
  .btn-b{
    background:transparent;
    color:var(--green);
  }
  .btn-b:hover{background:rgba(31,77,58,.06)}
  .label{
    display:block;
    font-size:.78rem;
    font-weight:500;
    text-transform:uppercase;
    letter-spacing:.06em;
    opacity:.7;
    margin-bottom:.3rem;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Perform40 — Landing pages MVP</h1>
    <p>Choisissez la version à consulter.</p>
    <div class="choices">
      <a class="btn btn-a" href="/option-a/">
        <span class="label">Option A</span>
        Perform40 — Performance
      </a>
      <a class="btn btn-b" href="/option-b/">
        <span class="label">Option B</span>
        Recover40 — Récupération
      </a>
    </div>
  </div>
</body>
</html>
